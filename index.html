// Offline support: pre-cache resources + register SW if sw.js exists
(async()=>{if(!('caches' in window))return;
  try{const c=await caches.open('repforge-v8');
    const urls=['./','./index.html',
      'https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js'];
    for(const u of urls){try{const r=await fetch(u);if(r.ok)await c.put(u,r)}catch{}}
  }catch{}
  if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
})();

// Normalize rest values to seconds (number)
function normalizeRest(r){
  if(!r&&r!==0)return 90;
  const str=String(r).trim().toLowerCase().replace(/–/g,"-").replace(/—/g,"-");
  if(str.includes("min")){const m=str.match(/(\d+)/);return(parseInt(m?.[1])||2)*60}
  if(/\d\s*s/.test(str)){const m=str.match(/(\d+)/);return parseInt(m?.[1])||90}
  const n=parseFloat(str);if(!isNaN(n)&&n>0)return n<=10?Math.round(n*60):Math.round(n);
  const m=str.match(/(\d+)/);if(m){const v=parseInt(m[1]);return v<=10?v*60:v}
  return 90;
}
function migrateRests(state){
  if(state.td){Object.keys(state.td).forEach(k=>{state.td[k].exercises.forEach(ex=>{ex.rest=normalizeRest(ex.rest)})})}
  return state;
}

function getProgression(wk,exIdx,state){
  const w=state.w[wk];if(!w)return null;const cur=w.cur;
  let prevWeight=null;
  for(let i=cur-1;i>=0;i--){if(w.sessions[i].status==="done"&&w.sessions[i].exercises[exIdx]){prevWeight=w.sessions[i].exercises[exIdx].weight;break}}
  const curWeight=w.sessions[cur]?.exercises[exIdx]?.weight;
  if(prevWeight==null||curWeight==null)return null;
  if(curWeight>prevWeight)return"up";if(curWeight<prevWeight)return"down";return"same";
}

// Gym timer beep — clean triple ping at 880Hz, cuts through noise without being annoying
function playAlarm(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const beep=(start,freq=880,dur=0.12)=>{
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=freq;o.type="sine";
      g.gain.setValueAtTime(0.6,start);
      g.gain.exponentialRampToValueAtTime(0.01,start+dur);
      o.start(start);o.stop(start+dur);
    };
    const t=ctx.currentTime;
    beep(t,880);beep(t+0.18,880);beep(t+0.36,1320,0.2);
  }catch{}
}
// Countdown warning beeps — single tick at 3,2,1s
function playTick(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator();const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=660;o.type="sine";
    const t=ctx.currentTime;
    g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.06);
    o.start(t);o.stop(t+0.06);
  }catch{}
}

// Wake Lock — keeps screen on during workout
function useWakeLock(active){
  const ref=useRef(null);
  useEffect(()=>{
    if(!active||!("wakeLock" in navigator))return;
    let released=false;
    const acquire=async()=>{try{ref.current=await navigator.wakeLock.request("screen")}catch{}};
    acquire();
    const h=()=>{if(!document.hidden&&!released)acquire()};
    document.addEventListener("visibilitychange",h);
    return()=>{released=true;try{ref.current?.release()}catch{};document.removeEventListener("visibilitychange",h)};
  },[active]);
}


function RestTimer({seconds,onClose}){
  const t=useT();
  const[rem,setRem]=useState(seconds);
  const[run,setRun]=useState(true);
  const endTimeRef=useRef(Date.now()+seconds*1000);
  const closedRef=useRef(false);
  const intervalRef=useRef(null);
  const bgTimeoutRef=useRef(null);
  const lastTickRef=useRef(-1);

  const fireAlarm=useCallback(()=>{
    if(closedRef.current)return;closedRef.current=true;
    clearInterval(intervalRef.current);clearTimeout(bgTimeoutRef.current);
    playAlarm();
    try{navigator.vibrate?.([300,150,300,150,400])}catch{};
    setRem(0);
  },[]);

  // Background setTimeout — fires alarm even when tab is hidden
  useEffect(()=>{
    if(!run){clearInterval(intervalRef.current);clearTimeout(bgTimeoutRef.current);return}
    const tick=()=>{
      const r=Math.max(0,Math.ceil((endTimeRef.current-Date.now())/1000));
      setRem(r);
      // Countdown ticks at 3,2,1
      if(r>0&&r<=3&&r!==lastTickRef.current){lastTickRef.current=r;playTick();try{navigator.vibrate?.(15)}catch{}}
      if(r<=0)fireAlarm();
    };
    intervalRef.current=setInterval(tick,250);
    clearTimeout(bgTimeoutRef.current);
    const ms=endTimeRef.current-Date.now();
    if(ms>0)bgTimeoutRef.current=setTimeout(fireAlarm,ms);
    return()=>{clearInterval(intervalRef.current);clearTimeout(bgTimeoutRef.current)};
  },[run,fireAlarm]);

  const togglePause=()=>{
    if(run){setRun(false)}
    else{endTimeRef.current=Date.now()+rem*1000;setRun(true)}
  };

  // Recalculate on visibility change (returning from background)
  useEffect(()=>{
    const h=()=>{if(!document.hidden&&run){
      const r=Math.max(0,Math.ceil((endTimeRef.current-Date.now())/1000));
      setRem(r);if(r<=0&&!closedRef.current)fireAlarm();
    }};
    document.addEventListener("visibilitychange",h);
    return()=>document.removeEventListener("visibilitychange",h);
  },[run,fireAlarm]);

  const pct=Math.min(((seconds-rem)/seconds)*100,100);
  const m=Math.floor(Math.max(0,rem)/60),s2=Math.max(0,rem)%60;
  const display=rem>0?`${m}:${s2.toString().padStart(2,"0")}`:"0:00";
  const done=rem<=0;
  const R=58,C=2*Math.PI*R;

  // Themed bottom sheet timer — matches app design
  // When done: fullscreen tap-anywhere overlay
  if(done)return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:100,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
      <div style={{animation:"fadeIn .3s ease-out",textAlign:"center"}}>
        <div style={{fontSize:64,marginBottom:12}}>💪</div>
        <div style={{fontSize:22,fontWeight:700,color:"#fff",marginBottom:6}}>Descanso finalizado!</div>
        <div style={{fontSize:15,color:"rgba(255,255,255,.5)"}}>Toque em qualquer lugar para continuar</div>
      </div>
    </div>
  );

  return(
    <div style={{position:"fixed",inset:0,background:t.overlay,zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:t.bg,borderRadius:"28px 28px 0 0",width:"100%",maxWidth:480,padding:"20px 24px",paddingBottom:"max(20px, env(safe-area-inset-bottom))"}}>
        <div style={{width:36,height:4,borderRadius:2,background:t.border,margin:"0 auto 16px"}}/>
        <div style={{display:"flex",alignItems:"center",gap:20}}>
          <div style={{position:"relative",width:130,height:130,flexShrink:0}}>
            <svg width="130" height="130" style={{transform:"rotate(-90deg)"}}>
              <circle cx="65" cy="65" r={R} fill="none" stroke={t.cardAlt} strokeWidth="5"/>
              <circle cx="65" cy="65" r={R} fill="none" stroke={rem<=3?t.yellow:t.accent} strokeWidth="5"
                strokeDasharray={C} strokeDashoffset={C*(1-pct/100)}
                strokeLinecap="round" style={{transition:"stroke-dashoffset .3s,stroke .3s"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <div style={{fontSize:36,fontWeight:700,color:t.text,fontVariantNumeric:"tabular-nums",letterSpacing:2,lineHeight:1}}>{display}</div>
              <div style={{fontSize:10,color:t.textTer,fontWeight:500,marginTop:4}}>Descanso</div>
            </div>
          </div>
          <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
            <button onClick={togglePause} style={{padding:"12px 0",borderRadius:14,background:t.card,border:`1px solid ${t.border}`,color:t.text,fontSize:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <I d={run?IC.pause:IC.play} s={16} c={t.text}/>{run?"Pausar":"Retomar"}
            </button>
            <button onClick={onClose} style={{padding:"12px 0",borderRadius:14,background:t.cardAlt,border:"none",color:t.textSec,fontSize:13,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <I d={IC.skip} s={14} c={t.textSec}/>Pular descanso
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function WP({value,type,onChange}){
  const t=useT();const ref=useRef(null);const opts=getOpts(type,value);
  useEffect(()=>{if(ref.current&&value!=null){const i=opts.indexOf(value);if(i>=0){const el=ref.current.children[i];if(el)el.scrollIntoView({inline:"center",behavior:"smooth"})}}},[value]);
  if(!opts.length)return null;
  return(
    <div style={{marginTop:8}}>
      <div style={{fontSize:10,color:t.textSec,marginBottom:6,fontWeight:600,letterSpacing:1.5,textTransform:"uppercase"}}>{type} — kg</div>
      <div ref={ref} style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6,scrollSnapType:"x mandatory",scrollbarWidth:"none"}}>
        {opts.map(w=><button key={w} onClick={()=>onChange(w)} style={{scrollSnapAlign:"center",minWidth:50,height:42,borderRadius:100,border:w===value?`2px solid ${t.accent}`:`1px solid ${t.border}`,background:w===value?t.accentBg:t.card,color:w===value?t.accentDark:t.textSec,fontWeight:w===value?700:400,fontSize:15,flexShrink:0,transition:"all .15s"}}>{w}</button>)}
      </div>
    </div>
  );
}

function ProgBadge({dir}){
  const t=useT();if(!dir)return null;
  const cfg={up:{color:t.green,bg:t.greenBg,label:"↑"},down:{color:t.red,bg:t.redBg,label:"↓"},same:{color:t.yellow,bg:t.yellowBg,label:"="}};
  const c=cfg[dir];
  return <span style={{display:"inline-flex",alignItems:"center",background:c.bg,color:c.color,fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:100,marginLeft:4}}>{c.label}</span>;
}

function ExCard({ex,data,onUpdate,onRest,prog,idx,totalEx,autoOpen}){
  const t=useT();const[open,setOpen]=useState(false);const cardRef=useRef(null);
  const curSets=data.sets||[];
  const skipped=data.skipped||false;
  const done=curSets.filter(Boolean).length;const all=done===curSets.length&&curSets.length>0;
  const prevAll=useRef(all);
  const pR=s=>normalizeRest(s);
  const tag=data.tag||null;
  const MAX_SETS=5;

  useEffect(()=>{if(autoOpen&&!all&&!skipped&&!open)setOpen(true)},[autoOpen]);
  useEffect(()=>{if(all&&!prevAll.current&&open){setTimeout(()=>setOpen(false),400)}prevAll.current=all;},[all]);
  const endRef=useRef(null);
  useEffect(()=>{if(!open)return;const tm=setTimeout(()=>{if(endRef.current)endRef.current.scrollIntoView({behavior:"smooth",block:"nearest"})},300);return()=>clearTimeout(tm)},[open]);
  const fmtRest=s=>{const r=parseInt(s)||0;if(r>=60){const m=Math.floor(r/60);const sec=r%60;return sec?`${m}min${sec}s`:`${m}min`}return r+"s"};

  const addSet=()=>{if(curSets.length>=MAX_SETS)return;const ns=[...curSets,false];
    if(tag==="dropset"){const dw=[...(data.dropWeights||[])];dw.push(dw.length>0?dw[dw.length-1]:data.weight);onUpdate({...data,sets:ns,dropWeights:dw})}
    else onUpdate({...data,sets:ns})};
  const removeSet=()=>{if(curSets.length<=1)return;const ns=curSets.slice(0,-1);
    if(tag==="dropset"){const dw=[...(data.dropWeights||[])];dw.pop();onUpdate({...data,sets:ns,dropWeights:dw})}
    else onUpdate({...data,sets:ns})};

  const setTag=(newTag)=>{
    if(newTag==="dropset"){
      const dw=curSets.map((_,i)=>i===0?data.weight:null);
      onUpdate({...data,tag:newTag,dropWeights:dw});
    } else {
      const nd={...data,tag:newTag};delete nd.dropWeights;onUpdate(nd);
    }
  };
  const cycleTag=()=>{const tags=[null,"superset","dropset"];const cur=tags.indexOf(tag);setTag(tags[(cur+1)%tags.length])};

  const tagLabel=tag==="superset"?"⚡ Super Set":tag==="dropset"?"🔻 Drop Set":null;
  const tagColor=tag==="superset"?t.yellow:tag==="dropset"?"#ab47bc":null;
  const tagDesc=tag==="superset"?"Sem descanso entre séries":tag==="dropset"?"Peso reduzido a cada série":null;

  const toggleSkip=()=>{onUpdate({...data,skipped:!skipped})};

  const handleSetClick=(i)=>{
    const n=[...curSets];n[i]=!n[i];onUpdate({...data,sets:n});
    try{navigator.vibrate?.(10)}catch{};
    if(!n[i])return;// unchecking
    onRest(pR(ex.rest));
  };

  return(
    <div ref={cardRef} className="fi" style={{background:skipped?t.cardAlt:all?t.greenBg:t.card,border:`1px solid ${skipped?t.border:all?t.greenBorder:t.border}`,borderRadius:20,padding:"14px 16px",transition:"all .2s",borderLeft:tag&&!skipped?`3px solid ${tagColor}`:undefined,opacity:skipped?.5:1}}>
      <div onClick={()=>{if(!skipped)setOpen(!open)}} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:600,color:skipped?t.textTer:all?t.green:t.text,display:"flex",alignItems:"center",gap:4,flexWrap:"wrap",textDecoration:skipped?"line-through":"none"}}>
            {all&&!skipped&&<I d={IC.check} s={14} c={t.green}/>}{skipped&&<I d={IC.skip} s={14} c={t.textTer}/>}<span style={{color:t.textTer,fontWeight:400,fontSize:12,marginRight:2}}>{idx+1}.</span>{ex.name}{!skipped&&<ProgBadge dir={prog}/>}
            {tagLabel&&!skipped&&<span style={{fontSize:9,fontWeight:700,color:tagColor,background:tagColor+"18",padding:"1px 6px",borderRadius:100}}>{tagLabel}</span>}
          </div>
          <div style={{fontSize:11,color:t.textSec,marginTop:2}}>{skipped?"Pulado":curSets.length+"×"+ex.reps+" · "+fmtRest(ex.rest)+(data.weight!=null?" · "+data.weight+" kg":"")}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:3}}>
          {skipped?<button onClick={e=>{e.stopPropagation();toggleSkip()}} style={{background:t.accentBg,border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:600,color:t.accent}}>Desfazer</button>
          :<>{curSets.map((d,i)=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:d?t.accent:t.border}}/>)}
          <span style={{marginLeft:4,transform:open?"rotate(180deg)":"",transition:"transform .2s",display:"inline-flex"}}><I d={IC.chevron} s={14} c={t.textSec}/></span></>}
        </div>
      </div>
      {open&&!skipped&&<div style={{marginTop:14}}>
        {WEIGHTS[ex.type]?.length>0&&tag!=="dropset"&&<WP value={data.weight} type={ex.type} onChange={w=>onUpdate({...data,weight:w})}/>}
        <div style={{marginTop:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontSize:10,color:t.textSec,fontWeight:600,letterSpacing:1.5}}>SÉRIES</div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <button onClick={removeSet} disabled={curSets.length<=1} style={{width:26,height:26,borderRadius:8,border:`1px solid ${t.border}`,background:t.card,display:"flex",alignItems:"center",justifyContent:"center",opacity:curSets.length<=1?.3:1}}><I d={IC.minus} s={12} c={t.textSec}/></button>
              <span style={{fontSize:12,fontWeight:600,color:t.textSec,minWidth:14,textAlign:"center"}}>{curSets.length}</span>
              <button onClick={addSet} disabled={curSets.length>=MAX_SETS} style={{width:26,height:26,borderRadius:8,border:`1px solid ${t.border}`,background:t.card,display:"flex",alignItems:"center",justifyContent:"center",opacity:curSets.length>=MAX_SETS?.3:1}}><I d={IC.plus} s={12} c={t.textSec}/></button>
            </div>
          </div>
          {tag==="dropset"?<div style={{display:"flex",flexDirection:"column",gap:6}}>
            {curSets.map((d,i)=>{const dw=data.dropWeights||[];const w=dw[i];
              return<div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>handleSetClick(i)} style={{width:44,height:44,borderRadius:12,border:d?"none":`1px solid ${t.border}`,background:d?"#ab47bc":t.card,color:d?"#fff":t.textSec,fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {d?<I d={IC.check} s={16} c="#fff"/>:i+1}
                </button>
                <div style={{flex:1,display:"flex",alignItems:"center",gap:6}}>
                  {i===0?<span style={{fontSize:14,fontWeight:600,color:t.text,minWidth:60}}>{data.weight} kg</span>
                  :<><input type="number" inputMode="decimal" defaultValue={w!=null?w:""} key={`dw${i}_${tag}`} onBlur={e=>{const nw=[...(data.dropWeights||curSets.map(()=>null))];nw[i]=e.target.value===""?null:parseFloat(e.target.value);nw[0]=data.weight;onUpdate({...data,dropWeights:nw})}} style={{width:70,padding:"8px 10px",borderRadius:10,border:`1px solid ${t.border}`,background:t.card,color:t.text,fontSize:14,textAlign:"center",outline:"none"}} placeholder="kg"/>
                  {w!=null&&w<(dw[i-1]??data.weight)&&<span style={{fontSize:9,color:"#ab47bc",fontWeight:600}}>↓{Math.round(((dw[i-1]??data.weight)-w)/(dw[i-1]??data.weight)*100)}%</span>}</>}
                </div>
              </div>})}
          </div>:<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {curSets.map((d,i)=><button key={i} onClick={()=>handleSetClick(i)} style={{width:50,height:50,borderRadius:14,border:d?"none":`1px solid ${t.border}`,background:d?(tag==="superset"?t.yellow:t.accent):t.card,color:d?"#fff":t.textSec,fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>
              {d?<I d={IC.check} s={16} c="#fff"/>:i+1}
            </button>)}
          </div>}
        </div>
        <div style={{display:"flex",gap:6,marginTop:12,alignItems:"center",flexWrap:"wrap"}}>
          <button onClick={cycleTag} style={{padding:"6px 12px",borderRadius:100,border:`1px solid ${tag?tagColor+"55":t.border}`,background:tag?tagColor+"18":t.card,color:tag?tagColor:t.textSec,fontSize:11,fontWeight:600}}>{tag==="superset"?"⚡ Super Set":tag==="dropset"?"🔻 Drop Set":"Normal"}</button>
          {tagDesc&&<span style={{fontSize:10,color:t.textTer,fontStyle:"italic"}}>{tagDesc}</span>}
          <button onClick={toggleSkip} style={{padding:"6px 12px",borderRadius:100,border:`1px solid ${t.border}`,background:t.card,color:t.textSec,fontSize:11,fontWeight:500,marginLeft:"auto"}}>Pular</button>
        </div>
        <div ref={endRef} style={{height:1,scrollMarginBottom:120}}/>
      </div>}
    </div>
  );
}

// ── COLOR PICKER (Canva-style) ───────────────────────────────
function ColorPicker({color,onChange}){
  const t=useT();
  const canvasRef=useRef(null);const hueRef=useRef(null);
  const[hue,setHue]=useState(0);
  const[sat,setSat]=useState(100);
  const[val,setVal]=useState(100);
  const[hex,setHex]=useState(color||"#ff0000");
  const dragging=useRef(null);

  // hex to hsv
  useEffect(()=>{
    const r=parseInt(color.slice(1,3),16)/255,g=parseInt(color.slice(3,5),16)/255,b=parseInt(color.slice(5,7),16)/255;
    const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
    let h=0;if(d){if(mx===r)h=((g-b)/d)%6;else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h=Math.round(h*60);if(h<0)h+=360}
    const s=mx?Math.round(d/mx*100):0;const v=Math.round(mx*100);
    setHue(h);setSat(s);setVal(v);setHex(color);
  },[]);

  const hsvToHex=(h,s,v)=>{
    s/=100;v/=100;const c=v*s,x=c*(1-Math.abs((h/60)%2-1)),m=v-c;
    let r=0,g=0,b=0;
    if(h<60){r=c;g=x}else if(h<120){r=x;g=c}else if(h<180){g=c;b=x}else if(h<240){g=x;b=c}else if(h<300){r=x;b=c}else{r=c;b=x}
    const toH=n=>Math.round((n+m)*255).toString(16).padStart(2,"0");
    return`#${toH(r)}${toH(g)}${toH(b)}`;
  };

  const update=(h,s,v)=>{const c=hsvToHex(h,s,v);setHex(c);onChange(c)};

  const handleGradient=(e,isTouch)=>{
    const rect=canvasRef.current.getBoundingClientRect();
    const clientX=isTouch?e.touches[0].clientX:e.clientX;
    const clientY=isTouch?e.touches[0].clientY:e.clientY;
    const x=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
    const y=Math.max(0,Math.min(1,(clientY-rect.top)/rect.height));
    const s2=Math.round(x*100);const v2=Math.round((1-y)*100);
    setSat(s2);setVal(v2);update(hue,s2,v2);
  };

  const handleHue=(e,isTouch)=>{
    const rect=hueRef.current.getBoundingClientRect();
    const clientX=isTouch?e.touches[0].clientX:e.clientX;
    const x=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
    const h2=Math.round(x*360);setHue(h2);update(h2,sat,val);
  };

  const onDown=(type)=>(e)=>{e.preventDefault();dragging.current=type;if(type==="grad")handleGradient(e,e.type==="touchstart");else handleHue(e,e.type==="touchstart")};

  useEffect(()=>{
    const onMove=e=>{if(!dragging.current)return;e.preventDefault();if(dragging.current==="grad")handleGradient(e,e.type==="touchmove");else handleHue(e,e.type==="touchmove")};
    const onUp=()=>{dragging.current=null};
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
    window.addEventListener("touchmove",onMove,{passive:false});window.addEventListener("touchend",onUp);
    return()=>{window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp);window.removeEventListener("touchmove",onMove);window.removeEventListener("touchend",onUp)};
  },[hue,sat,val]);

  const hueColor=hsvToHex(hue,100,100);

  return(
    <div>
      <div ref={canvasRef} onMouseDown={onDown("grad")} onTouchStart={onDown("grad")}
        style={{width:"100%",height:160,borderRadius:12,position:"relative",cursor:"crosshair",
          background:`linear-gradient(to top,#000,transparent),linear-gradient(to right,#fff,${hueColor})`,touchAction:"none"}}>
        <div style={{position:"absolute",left:`${sat}%`,top:`${100-val}%`,width:18,height:18,borderRadius:"50%",border:"3px solid #fff",boxShadow:"0 1px 4px rgba(0,0,0,.4)",transform:"translate(-50%,-50%)",pointerEvents:"none",background:hex}}/>
      </div>
      <div ref={hueRef} onMouseDown={onDown("hue")} onTouchStart={onDown("hue")}
        style={{width:"100%",height:16,borderRadius:8,marginTop:12,cursor:"pointer",touchAction:"none",
          background:"linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)",position:"relative"}}>
        <div style={{position:"absolute",left:`${hue/360*100}%`,top:"50%",width:20,height:20,borderRadius:"50%",border:"3px solid #fff",boxShadow:"0 1px 4px rgba(0,0,0,.4)",transform:"translate(-50%,-50%)",pointerEvents:"none",background:hueColor}}/>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginTop:12}}>
        <div style={{width:36,height:36,borderRadius:10,background:hex,border:`1px solid ${t.border}`,flexShrink:0}}/>
        <input value={hex} onChange={e=>{const v=e.target.value;setHex(v);if(/^#[0-9a-fA-F]{6}$/.test(v)){onChange(v);const r=parseInt(v.slice(1,3),16)/255,g=parseInt(v.slice(3,5),16)/255,b=parseInt(v.slice(5,7),16)/255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;let h=0;if(d){if(mx===r)h=((g-b)/d)%6;else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h=Math.round(h*60);if(h<0)h+=360}setHue(h);setSat(mx?Math.round(d/mx*100):0);setVal(Math.round(mx*100))}}}
          style={{flex:1,padding:"8px 12px",borderRadius:10,border:`1px solid ${t.border}`,background:t.inputBg,color:t.text,fontSize:14,outline:"none",fontFamily:"monospace"}}/>
      </div>
    </div>
  );
}

function PasteImportModal({existingWorkouts,onImport,onClose}){
  const t=useT();
  const[text,setText]=useState("");
  const[wkName,setWkName]=useState("");
  const[dow,setDow]=useState(1);
  const[target,setTarget]=useState("new");// "new" or existing workout name
  const[preview,setPreview]=useState([]);

  const doPreview=(raw)=>{
    setText(raw);
    const norm=raw.replace(/\t/g,"  ").replace(/[|;]/g," ");
    const lines=norm.split(/\n/).map(l=>l.trim()).filter(l=>l&&!/^[-=#*_]{2,}$/.test(l));
    const exs=[];
    for(const line of lines){
      if(!/\d/.test(line))continue;
      let name=line,sets=3,reps="8-12",rest=90,weight=null;
      const sm=name.match(/(\d+)\s*[xX×]\s*(\S+)/);if(sm){sets=parseInt(sm[1])||3;reps=sm[2].replace(/[,;]/g,"");name=name.replace(sm[0],"");}
      const wm=name.match(/(\d+\.?\d*)\s*kg\b/i);if(wm){weight=parseFloat(wm[1]);name=name.replace(wm[0],"");}
      const rm=name.match(/\b(\d+)\s*(?:seg(?:undos)?)\b/i);
      const rms=name.match(/\b(\d{2,3})\s*s\b(?![\wáéíóúãõ])/i);
      const rmm=name.match(/\b(\d+)\s*min\b/i);
      if(rm){rest=parseInt(rm[1]);name=name.replace(rm[0],"");}
      else if(rms){rest=parseInt(rms[1]);name=name.replace(rms[0],"");}
      else if(rmm){rest=parseInt(rmm[1])*60;name=name.replace(rmm[0],"");}
      else{const bn=name.match(/(?:^|[\s,])\s*(\d{2,3})(?=[\s,]|$)/);if(bn){const v=parseInt(bn[1]);if(v>=30&&v<=300){rest=v;name=name.replace(bn[0],"");}}}
      name=name.replace(/[·\-–—|,;]\s*$/,"").replace(/^\s*[·\-–—|,;]\s*/,"").replace(/\s{2,}/g," ").trim();
      if(!name||name.length<2)continue;
      name=name.charAt(0).toUpperCase()+name.slice(1);
      exs.push({name,sets,reps,rest,weight});
    }
    setPreview(exs);
  };

  const doImport=()=>{
    const finalName=target==="new"?wkName.trim():target;
    if(!finalName){alert("Defina um nome para o treino");return}
    const count=onImport(text,finalName,target==="new"?dow:0);
    if(count)onClose();
  };

  const inp={width:"100%",padding:"12px 14px",borderRadius:12,border:`1px solid ${t.border}`,background:t.inputBg,color:t.text,fontSize:15,outline:"none",marginBottom:14};
  const lbl={fontSize:10,color:t.textSec,fontWeight:600,letterSpacing:1.5,display:"block",marginBottom:4,textTransform:"uppercase"};

  return(
    <Modal onClose={onClose}>
      <h2 style={{fontSize:18,fontWeight:700,marginBottom:8,color:t.text}}>Importar treino</h2>
      <p style={{fontSize:12,color:t.textSec,marginBottom:16}}>Cole exercícios de qualquer fonte. Formato esperado: nome, séries×reps, descanso, peso.</p>
      <label style={lbl}>Texto</label>
      <textarea value={text} onChange={e=>doPreview(e.target.value)} placeholder={"Supino reto com barra 4x6-8 120s 16kg\nElevação lateral 3x12-15 90s 6kg\nPrancha 3x30-45s 60s"} style={{...inp,minHeight:120,resize:"vertical",fontFamily:"monospace",fontSize:13,lineHeight:1.5}}/>

      {preview.length>0&&<div style={{marginBottom:14}}>
        <label style={lbl}>{preview.length} exercício{preview.length!==1?"s":""} detectado{preview.length!==1?"s":""}</label>
        <div style={{maxHeight:140,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
          {preview.map((ex,i)=><div key={i} style={{fontSize:12,color:t.text,padding:"6px 10px",background:t.cardAlt,borderRadius:8}}>
            <span style={{fontWeight:600}}>{ex.name}</span>
            <span style={{color:t.textSec,marginLeft:6}}>{ex.sets}×{ex.reps} · {ex.rest>=60?`${Math.floor(ex.rest/60)}min`:ex.rest+"s"}{ex.weight!=null?` · ${ex.weight}kg`:""}</span>
          </div>)}
        </div>
      </div>}

      <label style={lbl}>Destino</label>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        <button onClick={()=>setTarget("new")} style={{padding:"8px 14px",borderRadius:100,border:target==="new"?`2px solid ${t.accent}`:`1px solid ${t.border}`,background:target==="new"?t.accentBg:t.card,color:target==="new"?t.accentDark:t.textSec,fontSize:12,fontWeight:target==="new"?600:400}}>Novo treino</button>
        {existingWorkouts.map(k=><button key={k} onClick={()=>setTarget(k)} style={{padding:"8px 14px",borderRadius:100,border:target===k?`2px solid ${t.accent}`:`1px solid ${t.border}`,background:target===k?t.accentBg:t.card,color:target===k?t.accentDark:t.textSec,fontSize:12,fontWeight:target===k?600:400}}>{k}</button>)}
      </div>

      {target==="new"&&<div>
        <label style={lbl}>Nome do treino</label>
        <input value={wkName} onChange={e=>setWkName(e.target.value)} style={inp} placeholder="Ex: Peito / Ombro"/>
        <label style={lbl}>Dia da semana</label>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          {DAYS.map((d,i)=><button key={i} onClick={()=>setDow(i)} style={{padding:"8px 12px",borderRadius:100,border:i===dow?`2px solid ${t.accent}`:`1px solid ${t.border}`,background:i===dow?t.accentBg:t.card,color:i===dow?t.accentDark:t.textSec,fontSize:12,fontWeight:i===dow?600:400}}>{d}</button>)}
        </div>
      </div>}

      <div style={{display:"flex",gap:10}}>
        <button onClick={onClose} style={{flex:1,padding:14,borderRadius:14,background:t.cardAlt,border:"none",color:t.textSec,fontSize:14,fontWeight:500}}>Cancelar</button>
        <button onClick={doImport} disabled={!preview.length} style={{flex:1,padding:14,borderRadius:14,background:preview.length?t.accent:t.border,border:"none",color:preview.length?"#fff":t.textSec,fontSize:14,fontWeight:700}}>Importar {preview.length||""}</button>
      </div>
    </Modal>
  );
}

function PlanModal({state,setState,onClose}){
  const t=useT();
  const[total,setTotal]=useState(state.total||"");
  const[startD,setStartD]=useState(state.startDate?.slice(0,10)||"");
  const[phases,setPhases]=useState(JSON.parse(JSON.stringify(state.phases||[])));
  const[pickIdx,setPickIdx]=useState(null);
  const inp={width:"100%",padding:"12px 14px",borderRadius:12,border:`1px solid ${t.border}`,background:t.inputBg,color:t.text,fontSize:15,outline:"none",marginBottom:14};
  const lbl={fontSize:10,color:t.textSec,fontWeight:600,letterSpacing:1,display:"block",marginBottom:4};
  const addPhase=()=>{if(phases.length<8)setPhases([...phases,{name:"Nova fase",color:PALETTE[phases.length%PALETTE.length]}])};
  const removePhase=i=>{const c=[...phases];c.splice(i,1);setPhases(c)};
  const updatePhase=(i,field,val)=>{const c=[...phases];c[i]={...c[i],[field]:val};setPhases(c)};
  const apply=()=>{
    const t2=parseInt(total)||16;
    const s=new Date(startD);const e=new Date(s);e.setDate(e.getDate()+t2*7);
    setState(p=>{
      const n={...JSON.parse(JSON.stringify(p)),startDate:s.toISOString(),endDate:e.toISOString(),total:t2,phases};
      if(t2!==p.total){const newW={};Object.keys(n.td).forEach(k=>{const old=n.w[k];newW[k]={cur:Math.min(old?.cur||0,t2-1),sessions:Array.from({length:t2},(_,i)=>{if(old?.sessions[i])return old.sessions[i];return{status:null,exercises:n.td[k].exercises.map(e=>({weight:e.initWeight,sets:Array(e.sets).fill(false)}))}})};});n.w=newW;}
      return n;
    });onClose();
  };
  return(
    <Modal onClose={onClose}>
      {pickIdx!==null&&<div style={{position:"absolute",inset:0,background:t.overlay,borderRadius:24,zIndex:10,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setPickIdx(null)}>
        <div style={{background:t.bg,borderRadius:20,padding:20,width:300,boxShadow:"0 8px 32px rgba(0,0,0,.2)"}} onClick={e=>e.stopPropagation()}>
          <p style={{fontSize:13,fontWeight:600,color:t.text,marginBottom:12}}>Escolher cor</p>
          <ColorPicker color={phases[pickIdx]?.color||"#4285f4"} onChange={c=>updatePhase(pickIdx,"color",c)}/>
          <button onClick={()=>setPickIdx(null)} style={{marginTop:12,width:"100%",padding:10,borderRadius:12,background:t.accent,border:"none",color:"#fff",fontSize:14,fontWeight:600}}>OK</button>
        </div>
      </div>}
      <h2 style={{fontSize:18,fontWeight:700,marginBottom:24,color:t.text,display:"flex",alignItems:"center",gap:10}}><I d={IC.calendar} s={20} c={t.accent}/>Configurar plano</h2>
      <label style={lbl}>DATA DE INÍCIO</label>
      <input type="date" value={startD} onChange={e=>setStartD(e.target.value)} style={{...inp,WebkitAppearance:"none",maxWidth:"100%",overflow:"hidden"}}/>
      <label style={lbl}>DURAÇÃO (SEMANAS)</label>
      <input type="number" min="1" max="52" value={total} onChange={e=>setTotal(e.target.value===""?"":parseInt(e.target.value)||"")} style={inp} placeholder="Ex: 16"/>
      
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <label style={{...lbl,marginBottom:0}}>FASES DE PERIODIZAÇÃO</label>
      </div>
      {phases.map((ph,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
          <button onClick={()=>setPickIdx(i)} style={{width:36,height:36,borderRadius:"50%",background:ph.color,border:`3px solid ${t.border}`,cursor:"pointer",flexShrink:0,padding:0,boxShadow:"inset 0 0 0 2px rgba(255,255,255,.3)"}}/>
          <input value={ph.name} onChange={e=>updatePhase(i,"name",e.target.value)} style={{...inp,marginBottom:0,flex:1}} placeholder="Nome da fase"/>
          <button onClick={()=>removePhase(i)} style={{background:"transparent",border:"none",borderRadius:10,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:.5}}><I d={IC.close} s={16} c={t.textSec}/></button>
        </div>
      ))}
      <button onClick={addPhase} style={{width:"100%",padding:10,borderRadius:12,background:t.card,border:`1px dashed ${t.border}`,color:t.accent,fontSize:13,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:14}}><I d={IC.plus} s={14} c={t.accent}/>Adicionar fase</button>
      {phases.length===0&&<p style={{fontSize:12,color:t.textTer,marginBottom:14}}>Sem fases — progresso será linear.</p>}

      {startD&&total&&<p style={{fontSize:12,color:t.textSec,marginTop:10,marginBottom:16}}>Término: {new Date(new Date(startD).getTime()+(parseInt(total)||16)*7*86400000).toLocaleDateString("pt-BR")}</p>}
      <div style={{display:"flex",gap:10}}>
        <button onClick={onClose} style={{flex:1,padding:14,borderRadius:14,background:t.cardAlt,border:"none",color:t.textSec,fontSize:14,fontWeight:500}}>Cancelar</button>
        <button onClick={apply} style={{flex:1,padding:14,borderRadius:14,background:t.accent,border:"none",color:"#fff",fontSize:14,fontWeight:700}}>Salvar</button>
      </div>
    </Modal>
  );
}

// ── PROGRESS CHART (per exercise) ─────────────────────────────
function ProgressChart({wk,state,onClose}){
  const t=useT();const td=state.td;const w=state.w[wk];
  if(!w||!td[wk])return null;
  const exs=td[wk].exercises;const[sel,setSel]=useState(0);
  const ex=exs[sel];if(!ex)return null;

  // gather data points: session index → weight
  const pts=[];
  w.sessions.forEach((s,i)=>{
    if(s.status==="done"&&s.exercises[sel]){
      const wt=s.exercises[sel].weight;
      if(wt!=null)pts.push({si:i+1,w:wt,sets:s.exercises[sel].sets?.filter(Boolean).length||0,total:s.exercises[sel].sets?.length||ex.sets,tag:s.exercises[sel].tag||null,deload:s.deload||false});
    }
  });

  const maxW=pts.length?Math.max(...pts.map(p=>p.w)):0;
  const minW=pts.length?Math.min(...pts.map(p=>p.w)):0;
  const range=maxW-minW||1;
  const chartW=320;const chartH=160;const padL=40;const padB=24;const padT=10;
  const usableW=chartW-padL-10;const usableH=chartH-padT-padB;

  const toX=(i)=>padL+(i/(Math.max(pts.length-1,1)))*usableW;
  const toY=(v)=>padT+(1-(v-minW)/range)*usableH;

  const path=pts.length>1?pts.map((p,i)=>`${i===0?"M":"L"}${toX(i).toFixed(1)} ${toY(p.w).toFixed(1)}`).join(" "):"";
  const area=path?path+` L${toX(pts.length-1).toFixed(1)} ${(chartH-padB).toFixed(1)} L${toX(0).toFixed(1)} ${(chartH-padB).toFixed(1)} Z`:"";

  const delta=pts.length>=2?pts[pts.length-1].w-pts[0].w:0;
  const deltaPct=pts.length>=2&&pts[0].w?((delta/pts[0].w)*100).toFixed(1):0;

  return(
    <Modal onClose={onClose}>
      <h2 style={{fontSize:18,fontWeight:700,color:t.text,marginBottom:4,display:"flex",alignItems:"center",gap:8}}><I d={IC.chart} s={20} c={t.accent}/>Progressão</h2>
      <p style={{fontSize:12,color:t.textSec,marginBottom:16}}>{wk}</p>

      <div style={{display:"flex",gap:6,flexWrap:"nowrap",marginBottom:16,overflowX:"auto",paddingBottom:4,WebkitOverflowScrolling:"touch"}}>
        {exs.map((e,i)=><button key={i} onClick={()=>setSel(i)} style={{padding:"6px 12px",borderRadius:100,border:i===sel?`2px solid ${t.accent}`:`1px solid ${t.border}`,background:i===sel?t.accentBg:t.card,color:i===sel?t.accentDark:t.textSec,fontSize:11,fontWeight:i===sel?600:400,whiteSpace:"nowrap",flexShrink:0}}>{e.name}</button>)}
      </div>

      {pts.length<2?<div style={{textAlign:"center",padding:"30px 0",color:t.textTer,fontSize:13}}>Precisa de pelo menos 2 sessões concluídas para gerar gráfico</div>:(
      <div>
        <div style={{display:"flex",gap:16,marginBottom:12}}>
          <div style={{background:t.cardAlt,borderRadius:12,padding:"10px 14px",flex:1}}>
            <div style={{fontSize:10,color:t.textSec,fontWeight:600}}>ATUAL</div>
            <div style={{fontSize:20,fontWeight:700,color:t.text}}>{pts[pts.length-1].w}<span style={{fontSize:12,fontWeight:400,color:t.textSec}}> kg</span></div>
          </div>
          <div style={{background:t.cardAlt,borderRadius:12,padding:"10px 14px",flex:1}}>
            <div style={{fontSize:10,color:t.textSec,fontWeight:600}}>VARIAÇÃO</div>
            <div style={{fontSize:20,fontWeight:700,color:delta>0?t.green:delta<0?t.red:t.text}}>{delta>0?"+":""}{delta}<span style={{fontSize:12,fontWeight:400,color:t.textSec}}> kg ({delta>=0?"+":""}{deltaPct}%)</span></div>
          </div>
        </div>
        <svg viewBox={`0 0 ${chartW} ${chartH}`} style={{width:"100%",height:chartH}}>
          <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={t.accent} stopOpacity=".25"/><stop offset="100%" stopColor={t.accent} stopOpacity="0"/></linearGradient></defs>
          {[0,.25,.5,.75,1].map(f=>{const y=padT+f*usableH;const v=(minW+(1-f)*range).toFixed(1);return<g key={f}><line x1={padL} y1={y} x2={chartW-10} y2={y} stroke={t.border} strokeWidth=".5"/><text x={padL-6} y={y+4} textAnchor="end" fill={t.textTer} fontSize="9">{v}</text></g>})}
          {area&&<path d={area} fill="url(#cg)"/>}
          {path&&<path d={path} fill="none" stroke={t.accent} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>}
          {pts.map((p,i)=><g key={i}>
            <circle cx={toX(i)} cy={toY(p.w)} r={4} fill={p.deload?t.yellow:t.accent} stroke={t.bg} strokeWidth="2"/>
            {pts.length<=12&&<text x={toX(i)} y={chartH-padB+14} textAnchor="middle" fill={t.textTer} fontSize="8">S{p.si}</text>}
          </g>)}
        </svg>
      </div>)}
    </Modal>
  );
}

// ── WEEKLY SUMMARY ───────────────────────────────────────────
function WeeklySummary({state,onClose}){
  const t=useT();const td=state.td;const w=state.w;
  const WK=Object.keys(td);

  const now=new Date();const dayN=now.getDay();const diffMon=dayN===0?-6:1-dayN;
  const mon=new Date(now);mon.setDate(mon.getDate()+diffMon);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(sun.getDate()+6);sun.setHours(23,59,59,999);

  const weekSessions=[];const weekSkipped=[];
  WK.forEach(k=>{
    if(!w[k])return;
    w[k].sessions.forEach((s,i)=>{
      if(!s.at)return;const d=new Date(s.at);if(d<mon||d>sun)return;
      if(s.status==="done")weekSessions.push({wk:k,si:i,s,exs:td[k].exercises});
      if(s.status==="skipped")weekSkipped.push({wk:k,si:i,s,day:d.getDay()});
    });
  });

  const plannedDays=new Set();
  WK.forEach(k=>{if(td[k]?.dayOfWeek!=null)plannedDays.add(td[k].dayOfWeek)});

  let totalSets=0,totalVol=0,totalEx=0,muscleGroups=new Set();
  weekSessions.forEach(({s,exs})=>{
    exs.forEach((ex,i)=>{
      const d=s.exercises[i];if(!d||d.skipped)return;
      const done=d.sets?.filter(Boolean).length||0;
      if(done>0){totalEx++;totalSets+=done;
        if(d.tag==="dropset"&&d.dropWeights){d.dropWeights.forEach((dw,j)=>{if(d.sets[j])totalVol+=(dw||0)})}
        else if(d.weight)totalVol+=done*d.weight;
        const nl=ex.name.toLowerCase();
        if(/supino|peito|peck|crucifixo/i.test(nl))muscleGroups.add("Peito");
        if(/puxada|remada|costas|pullover/i.test(nl))muscleGroups.add("Costas");
        if(/ombro|lateral|desenvolvimento|face.?pull/i.test(nl))muscleGroups.add("Ombros");
        if(/bíceps|rosca/i.test(nl))muscleGroups.add("Bíceps");
        if(/tríceps/i.test(nl))muscleGroups.add("Tríceps");
        if(/leg|agachamento|extensora|flexora|panturrilha|terra|hip|abdut/i.test(nl))muscleGroups.add("Pernas");
        if(/prancha|abdominal|pallof/i.test(nl))muscleGroups.add("Core");
      }
    });
  });

  const weekDays=["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];
  const jsToIdx={1:0,2:1,3:2,4:3,5:4,6:5,0:6};
  const doneDays=new Set();const skippedDays=new Set();
  weekSessions.forEach(({s})=>{const d=new Date(s.at).getDay();doneDays.add(jsToIdx[d])});
  weekSkipped.forEach(({day})=>{skippedDays.add(jsToIdx[day])});
  const plannedIdx=new Set();plannedDays.forEach(d=>plannedIdx.add(jsToIdx[d]));
  const todayIdx=jsToIdx[now.getDay()];
  // Map day index to workout name
  const doneNames={};weekSessions.forEach(({s,wk})=>{const d=jsToIdx[new Date(s.at).getDay()];doneNames[d]=wk});
  const skippedNames={};weekSkipped.forEach(({wk,day})=>{skippedNames[jsToIdx[day]]=wk});
  const plannedNames={};WK.forEach(k=>{if(td[k]?.dayOfWeek!=null)plannedNames[jsToIdx[td[k].dayOfWeek]]=k});

  return(
    <Modal onClose={onClose}>
      <h2 style={{fontSize:18,fontWeight:700,color:t.text,marginBottom:4,display:"flex",alignItems:"center",gap:8}}><I d={IC.layers} s={20} c={t.accent}/>Resumo Semanal</h2>
      <p style={{fontSize:12,color:t.textSec,marginBottom:20}}>{mon.toLocaleDateString("pt-BR")} — {sun.toLocaleDateString("pt-BR")}</p>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        <div style={{background:t.accentBg,borderRadius:16,padding:14,textAlign:"center"}}>
          <div style={{fontSize:28,fontWeight:800,color:t.accent}}>{weekSessions.length}</div>
          <div style={{fontSize:11,color:t.textSec,fontWeight:500}}>Treinos</div>
        </div>
        <div style={{background:t.greenBg,borderRadius:16,padding:14,textAlign:"center"}}>
          <div style={{fontSize:28,fontWeight:800,color:t.green}}>{totalSets}</div>
          <div style={{fontSize:11,color:t.textSec,fontWeight:500}}>Séries feitas</div>
        </div>
        <div style={{background:t.yellowBg,borderRadius:16,padding:14,textAlign:"center"}}>
          <div style={{fontSize:28,fontWeight:800,color:t.yellow}}>{totalVol>0?(totalVol>=1000?(totalVol/1000).toFixed(1)+"t":totalVol.toFixed(0)):0}</div>
          <div style={{fontSize:11,color:t.textSec,fontWeight:500}}>Volume (kg)</div>
        </div>
        <div style={{background:t.redBg,borderRadius:16,padding:14,textAlign:"center"}}>
          <div style={{fontSize:28,fontWeight:800,color:t.red}}>{weekSkipped.length}</div>
          <div style={{fontSize:11,color:t.textSec,fontWeight:500}}>Pulados</div>
        </div>
      </div>

      <div style={{marginBottom:20}}>
        <div style={{fontSize:10,color:t.textSec,fontWeight:600,letterSpacing:1.5,marginBottom:10}}>FREQUÊNCIA</div>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {weekDays.map((d,i)=>{
            const done=doneDays.has(i);const skipped=skippedDays.has(i);
            const planned=plannedIdx.has(i);const past=i<=todayIdx;
            const missed=planned&&past&&!done&&!skipped;
            const upcoming=planned&&!past&&!done&&!skipped;
            const wkName=doneNames[i]||skippedNames[i]||(planned?plannedNames[i]:null);
            let statusBg,statusColor,statusIcon,statusText,rowBg,dayColor;
            if(done){statusBg=t.accent;statusColor="#fff";statusIcon=IC.check;statusText="Feito";rowBg=t.accentBg;dayColor=t.accent}
            else if(skipped){statusBg=t.red;statusColor="#fff";statusIcon=IC.skip;statusText="Pulado";rowBg=t.redBg;dayColor=t.red}
            else if(missed){statusBg="#f57c00";statusColor="#fff";statusIcon=null;statusText="Faltou";rowBg="#f57c0012";dayColor="#f57c00"}
            else if(upcoming){statusBg=t.accentBg;statusColor=t.accent;statusIcon=null;statusText="Agendado";rowBg=t.cardAlt;dayColor=t.accent}
            else{statusBg=null;statusColor=t.textTer;statusIcon=null;statusText=null;rowBg=t.cardAlt;dayColor=t.textTer}
            return<div key={d} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:rowBg,borderRadius:12}}>
              <span style={{fontSize:12,fontWeight:600,color:dayColor,width:28,flexShrink:0}}>{d}</span>
              {statusBg?<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",gap:3,padding:"2px 8px",borderRadius:100,background:statusBg,color:statusColor,fontSize:10,fontWeight:700,flexShrink:0}}>
                {statusIcon&&<I d={statusIcon} s={10} c={statusColor}/>}{statusText}
              </span>:<span style={{fontSize:10,color:t.textTer,fontStyle:"italic"}}>Descanso</span>}
              {wkName&&<span style={{fontSize:11,color:t.textSec,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{wkName}</span>}
            </div>})}
        </div>
      </div>

      {muscleGroups.size>0&&<div style={{marginBottom:16}}>
        <div style={{fontSize:10,color:t.textSec,fontWeight:600,letterSpacing:1.5,marginBottom:8}}>MÚSCULOS TREINADOS</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[...muscleGroups].map(g=><span key={g} style={{padding:"4px 10px",borderRadius:100,background:t.accentBg,color:t.accent,fontSize:11,fontWeight:600}}>{g}</span>)}
        </div>
      </div>}

      {weekSessions.length===0&&weekSkipped.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:t.textTer,fontSize:13}}>Nenhum treino concluído esta semana</div>}
    </Modal>
  );
}


function App(){
  const[state,setState]=useState(init);
  const[active,setActive]=useState(null);const[timer,setTimer]=useState(null);
  const[view,setView]=useState("home");const[hd,setHd]=useState(null);
  const[showPlan,setShowPlan]=useState(false);const[showNewWk,setShowNewWk]=useState(false);const[editEx,setEditEx]=useState(null);
  const[focusEx,setFocusEx]=useState(null);
  const[editName,setEditName]=useState("");
  const[editDay,setEditDay]=useState(0);
  const[showEquip,setShowEquip]=useState(false);
  const[newEquip,setNewEquip]=useState("");
  const[showPaste,setShowPaste]=useState(false);
  const[toast,setToast]=useState(null);
  const[sessionNote,setSessionNote]=useState("");
  const[showChart,setShowChart]=useState(null);// workout name or null
  const[showSummary,setShowSummary]=useState(false);

  // Keep screen on during workout
  useWakeLock(view==="workout");

  // ── Parse pasted text into exercises ──
  const parseText=(raw,wkName,dow)=>{
    const norm=raw.replace(/\t/g,"  ").replace(/[|;]/g," ");
    const lines=norm.split(/\n/).map(l=>l.trim()).filter(l=>l&&!/^[-=#*_]{2,}$/.test(l));
    const exs=[];
    for(const line of lines){
      if(!/\d/.test(line))continue;
      let name=line,sets=3,reps="8-12",rest=90,weight=null,type="máquina";
      // 1) extract sets x reps FIRST (before rest, to avoid "30-45s" being eaten)
      const sm=name.match(/(\d+)\s*[xX×]\s*(\S+)/);
      if(sm){sets=parseInt(sm[1])||3;reps=sm[2].replace(/[,;]/g,"");name=name.replace(sm[0],"");}
      // 2) extract weight
      const wm=name.match(/(\d+\.?\d*)\s*kg\b/i);
      if(wm){weight=parseFloat(wm[1]);name=name.replace(wm[0],"");}
      // 3) extract rest with unit
      const rm=name.match(/\b(\d+)\s*(?:seg(?:undos)?)\b/i);
      const rms=name.match(/\b(\d{2,3})\s*s\b(?![\wáéíóúãõ])/i);
      const rmm=name.match(/\b(\d+)\s*min\b/i);
      if(rm){rest=parseInt(rm[1]);name=name.replace(rm[0],"");}
      else if(rms){rest=parseInt(rms[1]);name=name.replace(rms[0],"");}
      else if(rmm){rest=parseInt(rmm[1])*60;name=name.replace(rmm[0],"");}
      // 4) bare number 30-300 as rest
      else{const bn=name.match(/(?:^|[\s,])\s*(\d{2,3})(?=[\s,]|$)/);if(bn){const v=parseInt(bn[1]);if(v>=30&&v<=300){rest=v;name=name.replace(bn[0],"");}}}
      // guess equipment type
      const nl=name.toLowerCase();
      if(/halter|haltere|dumbbell/i.test(nl))type="halter";
      else if(/barra|smith|supino.*barra|terra|rosca.*barra/i.test(nl))type="barra";
      else if(/polia|cabo|corda|cross|face.?pull|pullover.*polia|triceps.*corda/i.test(nl))type="polia";
      else if(/corpo|prancha|flexão|abdominal|plank/i.test(nl))type="corpo";
      else if(/elástico|band|faixa/i.test(nl))type="elástico";
      else if(/anilha/i.test(nl))type="anilha";
      name=name.replace(/[·\-–—|,;]\s*$/,"").replace(/^\s*[·\-–—|,;]\s*/,"").replace(/\s{2,}/g," ").trim();
      if(!name||name.length<2)continue;
      name=name.charAt(0).toUpperCase()+name.slice(1);
      exs.push({name,sets,reps,rest,initWeight:weight,type});
    }
    if(!exs.length){alert("Nenhum exercício encontrado.\nExemplo:\nSupino reto com barra 4x6-8 120s 16kg");return;}
    setState(p=>{
      const n=JSON.parse(JSON.stringify(p));
      if(n.td[wkName]){
        exs.forEach(ex=>{n.td[wkName].exercises.push(ex);n.w[wkName].sessions.forEach(s=>{if(!s.status)s.exercises.push({weight:ex.initWeight,sets:Array(ex.sets).fill(false)})})});
      }else{
        n.td[wkName]={dayLabel:DAYS[dow],dayOfWeek:dow,exercises:exs};
        n.w[wkName]={cur:0,sessions:Array.from({length:TOTAL},()=>({status:null,exercises:exs.map(e=>({weight:e.initWeight,sets:Array(e.sets).fill(false)}))}))};
        const order=[...(n.wkOrder||Object.keys(n.td)),wkName];
        order.sort((a,b)=>(n.td[a]?.dayOfWeek||0)-(n.td[b]?.dayOfWeek||0));
        n.wkOrder=order;
      }
      return n;
    });
    return exs.length;
  };

  const exportCSV=()=>{
    const rows=[["Treino","Dia","Exercício","Séries","Reps","Descanso (s)","Peso inicial (kg)","Equipamento"]];
    const td2=state.td;
    Object.keys(td2).forEach(k=>{td2[k].exercises.forEach(ex=>{rows.push([k,td2[k].dayLabel,ex.name,ex.sets,ex.reps,ex.rest,ex.initWeight??"",ex.type])})});
    // add session history as second section
    rows.push([]);rows.push(["--- Histórico ---"]);
    rows.push(["Treino","Sessão","Status","Data","Exercício","Peso (kg)","Séries feitas","Séries total"]);
    const w2=state.w;
    Object.keys(td2).forEach(k=>{const wk=w2[k];if(!wk)return;wk.sessions.forEach((s,si)=>{if(!s.status)return;td2[k].exercises.forEach((ex,ei)=>{const d=s.exercises[ei];if(!d)return;rows.push([k,si+1,s.status,s.at?new Date(s.at).toLocaleDateString("pt-BR"):"",ex.name,d.weight??"",d.sets.filter(Boolean).length,ex.sets])})})});
    const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`repforge-${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(a.href);
  };

  const dark=state.dark;const t=dark?themes.dark:themes.light;
  useEffect(()=>{sv(state)},[state]);
  useEffect(()=>{document.body.style.background=t.bg;document.body.style.color=t.text;document.getElementById("tc").content=t.bg},[dark]);

  const td=state.td;
  // ensure wkOrder is always valid
  const WK=useMemo(()=>{
    const order=state.wkOrder||[];
    const keys=Object.keys(td);
    // add any keys not in order
    const missing=keys.filter(k=>!order.includes(k));
    const valid=order.filter(k=>keys.includes(k));
    return[...valid,...missing];
  },[state.wkOrder,td]);
  const TOTAL=state.total||16;
  const phases=state.phases||[];const numPhases=phases.length;
  const PPH=numPhases>0?Math.max(1,Math.floor(TOTAL/numPhases)):TOTAL;
  const ph=s=>numPhases>0?Math.min(Math.floor(s/PPH),numPhases-1):0;

  const upEx=useCallback((wk,si,ei,d)=>{setState(p=>{const n=JSON.parse(JSON.stringify(p));n.w[wk].sessions[si].exercises[ei]=d;return n})},[]);

  const[showLoadModal,setShowLoadModal]=useState(null);// "deload"|"overload"|null

  const applyLoadAdjust=useCallback((wk,pct)=>{
    setState(p=>{const n=JSON.parse(JSON.stringify(p));const w=n.w[wk];const s=w.sessions[w.cur];
      // save originals for reset if not already saved
      if(!s._origWeights)s._origWeights=s.exercises.map(e=>e.weight);
      const factor=1+(pct/100);
      s.exercises.forEach((e,i)=>{
        const orig=s._origWeights[i];
        if(orig!=null)e.weight=Math.round(orig*factor*10)/10;
      });
      if(pct<0)s.deload=true;else delete s.deload;
      return n;
    });
    setShowLoadModal(null);
    const label=pct<0?`Deload: ${pct}%`:`Overload: +${pct}%`;
    setToast(label);setTimeout(()=>setToast(null),2000);
  },[]);

  const resetWeights=useCallback((wk)=>{
    setState(p=>{const n=JSON.parse(JSON.stringify(p));const w=n.w[wk];const s=w.sessions[w.cur];
      if(s._origWeights){s.exercises.forEach((e,i)=>{if(s._origWeights[i]!=null)e.weight=s._origWeights[i]});delete s._origWeights;delete s.deload;}
      return n;
    });setShowLoadModal(null);setToast("Pesos restaurados");setTimeout(()=>setToast(null),2000);
  },[]);

  const complete=useCallback((wk,status)=>{
    setState(p=>{
      const n=JSON.parse(JSON.stringify(p));const w=n.w[wk];const s=w.sessions[w.cur];
      s.status=status;s.at=new Date().toISOString();if(sessionNote.trim())s.note=sessionNote.trim();
      if(status==="done"&&w.cur<TOTAL-1){const nx=w.sessions[w.cur+1];s.exercises.forEach((e,i)=>{if(e.weight!=null&&nx.exercises[i])nx.exercises[i].weight=e.weight})}
      w.cur=Math.min(w.cur+1,TOTAL-1);return n;
    });setActive(null);setView("home");setSessionNote("");
    setToast(status==="done"?"Sessão concluída ✓":"Sessão pulada");setTimeout(()=>setToast(null),2000);
  },[TOTAL,sessionNote]);

  const saveExEdit=(wk,idx,data)=>{setState(p=>{const n=JSON.parse(JSON.stringify(p));if(idx===undefined){n.td[wk].exercises.push(data);n.w[wk].sessions.forEach(s=>{if(!s.status)s.exercises.push({weight:data.initWeight,sets:Array(data.sets).fill(false)})})}else{const old=n.td[wk].exercises[idx];n.td[wk].exercises[idx]=data;if(data.sets!==old.sets)n.w[wk].sessions.forEach(s=>{if(!s.status&&s.exercises[idx])s.exercises[idx].sets=Array(data.sets).fill(false)})}return n})};
  const deleteEx=(wk,idx)=>{setState(p=>{const n=JSON.parse(JSON.stringify(p));n.td[wk].exercises.splice(idx,1);n.w[wk].sessions.forEach(s=>{if(s.exercises[idx])s.exercises.splice(idx,1)});return n})};
  const createWorkout=(name,dow)=>{setState(p=>{const n=JSON.parse(JSON.stringify(p));n.td[name]={dayLabel:DAYS[dow],dayOfWeek:dow,exercises:[]};n.w[name]={cur:0,sessions:Array.from({length:TOTAL},()=>({status:null,exercises:[]}))};const order=[...(n.wkOrder||Object.keys(n.td)),name];order.sort((a,b)=>(n.td[a]?.dayOfWeek||0)-(n.td[b]?.dayOfWeek||0));n.wkOrder=order;return n})};
  const deleteWorkout=(wk)=>{setState(p=>{const n=JSON.parse(JSON.stringify(p));delete n.td[wk];delete n.w[wk];n.wkOrder=(n.wkOrder||[]).filter(k=>k!==wk);return n})};
  const duplicateWorkout=(wk)=>{const nn=wk+" (cópia)";if(state.td[nn])return;setState(p=>{const n=JSON.parse(JSON.stringify(p));n.td[nn]={...n.td[wk],exercises:n.td[wk].exercises.map(e=>({...e}))};n.w[nn]={cur:0,sessions:Array.from({length:TOTAL},()=>({status:null,exercises:n.td[nn].exercises.map(e=>({weight:e.initWeight,sets:Array(e.sets).fill(false)}))}))};n.wkOrder=[...(n.wkOrder||Object.keys(n.td)),nn];return n})};
  const renameWorkout=(oldName,newName)=>{if(!newName||newName===oldName||state.td[newName])return;setState(p=>{const n=JSON.parse(JSON.stringify(p));n.td[newName]=n.td[oldName];delete n.td[oldName];n.w[newName]=n.w[oldName];delete n.w[oldName];n.wkOrder=(n.wkOrder||[]).map(k=>k===oldName?newName:k);return n});setActive(newName)};
  const moveWorkout=(wk,dir)=>{setState(p=>{const n=JSON.parse(JSON.stringify(p));const o=n.wkOrder?[...n.wkOrder]:Object.keys(n.td);const i=o.indexOf(wk);if(i<0)return p;const j=i+dir;if(j<0||j>=o.length)return p;
    // swap day info
    const a=n.td[o[i]],b=n.td[o[j]];
    const tmpD=a.dayOfWeek,tmpL=a.dayLabel;
    a.dayOfWeek=b.dayOfWeek;a.dayLabel=b.dayLabel;
    b.dayOfWeek=tmpD;b.dayLabel=tmpL;
    const tmp=o[i];o[i]=o[j];o[j]=tmp;n.wkOrder=o;return n})};

  const moveEx=(wk,idx,dir)=>{setState(p=>{const n=JSON.parse(JSON.stringify(p));const exs=n.td[wk].exercises;const j=idx+dir;if(j<0||j>=exs.length)return p;const tmp=exs[idx];exs[idx]=exs[j];exs[j]=tmp;n.w[wk].sessions.forEach(s=>{if(s.exercises.length>Math.max(idx,j)){const t2=s.exercises[idx];s.exercises[idx]=s.exercises[j];s.exercises[j]=t2}});return n})};

  const daysLeft=()=>{if(!state.endDate)return null;const d=Math.ceil((new Date(state.endDate)-new Date())/86400000);return d};

  const nextWk=useMemo(()=>{
    const today=new Date().getDay();
    const available=WK.filter(k=>{const w=state.w[k];return w&&!(w.cur>=TOTAL||(w.cur===TOTAL-1&&w.sessions[w.cur]?.status))});
    if(!available.length)return null;
    const todayWk=available.find(k=>td[k]?.dayOfWeek===today);
    if(todayWk)return todayWk;
    available.sort((a,b)=>{const da=((td[a]?.dayOfWeek||0)-today+7)%7;const db=((td[b]?.dayOfWeek||0)-today+7)%7;return(da||7)-(db||7)});
    return available[0];
  },[state,WK,TOTAL]);

  if(view==="home"){
    const totalDone=WK.reduce((s,k)=>s+(state.w[k]?.sessions.filter(x=>x.status==="done").length||0),0);
    const total=WK.length*TOTAL;const pct=total?Math.round(totalDone/total*100):0;const dl=daysLeft();
    return(
      <TC.Provider value={t}>
      <div style={{minHeight:"100dvh",maxWidth:480,margin:"0 auto",background:t.bg}}>
        {toast&&<div style={{position:"fixed",top:40,left:"50%",transform:"translateX(-50%)",background:t.green,color:"#fff",padding:"10px 24px",borderRadius:100,fontSize:14,fontWeight:600,zIndex:200,animation:"fadeIn .2s ease-out",boxShadow:"0 4px 12px rgba(0,0,0,.2)"}}>{toast}</div>}
        {showPlan&&<PlanModal state={state} setState={setState} onClose={()=>setShowPlan(false)}/>}
        {showNewWk&&<NewWorkoutModal onSave={createWorkout} onClose={()=>setShowNewWk(false)}/>}
        {showPaste&&<PasteImportModal existingWorkouts={WK} onImport={parseText} onClose={()=>setShowPaste(false)}/>}
        {showChart&&<ProgressChart wk={showChart} state={state} onClose={()=>setShowChart(null)}/>}
        {showSummary&&<WeeklySummary state={state} onClose={()=>setShowSummary(false)}/>}
        {editEx&&<EditModal td={td} wk={editEx.wk} exIdx={editEx.idx} isNew={editEx.isNew} onSave={d=>saveExEdit(editEx.wk,editEx.idx,d)} onDelete={()=>deleteEx(editEx.wk,editEx.idx)} onClose={()=>setEditEx(null)} allTypes={[...TYPES.filter(t2=>!(state.removedTypes||[]).includes(t2)),...(state.customTypes||[])]}/>}

        <div style={{padding:"28px 20px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <h1 style={{fontSize:28,fontWeight:800,letterSpacing:-.5,color:t.text}}><span style={{color:t.accent}}>Rep</span><span>Forge</span></h1>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setState(p=>({...p,dark:!p.dark}))} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}><I d={dark?IC.sun:IC.moon} s={18} c={t.textSec}/></button>
              <button onClick={()=>setShowSummary(true)} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}><I d={IC.layers} s={18} c={t.textSec}/></button>
              <button onClick={()=>setShowPlan(true)} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}><I d={IC.calendar} s={18} c={t.textSec}/></button>
              <button onClick={()=>setView("history")} style={{background:t.card,border:`1px solid ${t.border}`,borderRadius:12,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center"}}><I d={IC.history} s={18} c={t.textSec}/></button>
            </div>
          </div>
        </div>

        <div style={{padding:"0 20px 16px"}}>
          <div style={{background:t.card,borderRadius:24,padding:20,border:`1px solid ${t.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}>
              <span style={{fontSize:13,color:t.textSec,fontWeight:500}}>Progresso</span>
              <span style={{fontSize:13,color:t.accent,fontWeight:600}}>{totalDone}/{total}</span>
            </div>
            <div style={{height:6,background:t.cardAlt,borderRadius:3}}>
              <div style={{height:6,borderRadius:3,background:`linear-gradient(90deg,${t.accent},${t.accentDark})`,width:`${pct}%`,transition:"width .5s"}}/>
            </div>
            {numPhases>0&&<div style={{display:"flex",justifyContent:"space-between",marginTop:14}}>
              {phases.map((p,i)=>{const isA=WK.some(k=>state.w[k]&&ph(state.w[k].cur)===i);return<span key={i} style={{fontSize:10,fontWeight:isA?700:500,color:isA?t.text:t.textSec,letterSpacing:.5,display:"flex",alignItems:"center",gap:4}}><span style={{width:6,height:6,borderRadius:"50%",background:p.color,opacity:isA?1:.5,flexShrink:0}}/>{p.name}</span>})}
            </div>}
            {dl!==null&&<div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${t.cardAlt}`,display:"flex",justifyContent:"space-between",fontSize:12,color:t.textSec}}>
              <span>{state.startDate&&new Date(state.startDate).toLocaleDateString("pt-BR")} → {state.endDate&&new Date(state.endDate).toLocaleDateString("pt-BR")}</span>
              <span style={{fontWeight:600,color:dl<0?t.red:dl<14?t.yellow:t.textSec}}>{dl<0?"Expirado":`${dl}d`}</span>
            </div>}
          </div>
        </div>

          <div style={{padding:"0 20px 20px",display:"flex",flexDirection:"column",gap:8}}>
            {(()=>{
              // Reorder: move all superset exercises to be consecutive
              const ordered=[];const ssItems=[];const nonSS=[];
              exs.forEach((ex,i)=>{
                const d=s.exercises[i]||{weight:null,sets:[]};
                if(d.tag==="superset")ssItems.push({ex,data:d,idx:i});
                else nonSS.push({ex,data:d,idx:i});
              });
              // Insert superset group at position of first superset exercise
              let ssInserted=false;
              exs.forEach((ex,i)=>{
                const d=s.exercises[i]||{weight:null,sets:[]};
                if(d.tag==="superset"){
                  if(!ssInserted){ordered.push({type:"superset",items:ssItems});ssInserted=true}
                } else {
                  ordered.push({type:"single",ex,data:d,idx:i});
                }
              });
              if(ssItems.length>0&&!ssInserted)ordered.push({type:"superset",items:ssItems});

              return ordered.map((g,gi)=>{
                if(g.type==="single"){
                  return<ExCard key={g.idx} ex={g.ex} data={g.data} onUpdate={d2=>upEx(k,si,g.idx,d2)} onRest={sec=>{setFocusEx(null);setTimer(sec)}} prog={getProgression(k,g.idx,state)} idx={g.idx} totalEx={exs.length} autoOpen={focusIdx===g.idx}/>;
                }
                if(g.items.length<2){
                  const it=g.items[0];
                  return<ExCard key={it.idx} ex={it.ex} data={it.data} onUpdate={d2=>upEx(k,si,it.idx,d2)} onRest={sec=>{setFocusEx(null);setTimer(sec)}} prog={getProgression(k,it.idx,state)} idx={it.idx} totalEx={exs.length} autoOpen={focusIdx===it.idx}/>;
                }
                const allGroupDone=g.items.every(it=>{const sets=it.data.sets||[];return sets.length>0&&sets.every(Boolean)});
                return<div key={`sg${gi}`} style={{border:`2px solid ${t.yellow}44`,borderRadius:24,padding:4,background:t.yellowBg+"33"}}>
                  <div style={{fontSize:10,fontWeight:700,color:t.yellow,padding:"4px 12px",display:"flex",alignItems:"center",gap:4}}>⚡ Super Set · {g.items.length} exercícios {allGroupDone&&<I d={IC.check} s={12} c={t.green}/>}</div>
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    {g.items.map((it,ii)=>{
                      const isLast=ii===g.items.length-1;
                      const lastDone=(()=>{const ls=g.items[g.items.length-1].data.sets||[];return ls.length>0&&ls.every(Boolean)})();
                      return<ExCard key={it.idx} ex={it.ex} data={it.data} onUpdate={d2=>upEx(k,si,it.idx,d2)} onRest={sec=>{
                        if(isLast||lastDone){setFocusEx(null);setTimer(sec)}
                      }} prog={getProgression(k,it.idx,state)} idx={it.idx} totalEx={exs.length} autoOpen={focusIdx===it.idx}/>;
                    })}
                  </div>
                </div>;
              });
            })()}
            <div style={{marginTop:4}}>
              <input value={sessionNote} onChange={e=>setSessionNote(e.target.value)} placeholder="Anotação da sessão" style={{width:"100%",padding:"10px 14px",borderRadius:12,border:`1px solid ${t.border}`,background:t.card,color:t.text,fontSize:13,outline:"none"}}/>
            </div>
          </div>
        </div>
        <div style={{background:t.bg,borderTop:`1px solid ${t.border}`,padding:"12px 20px",paddingBottom:"max(12px, env(safe-area-inset-bottom))",display:"flex",gap:10,flexShrink:0}}>
          <button onClick={()=>complete(k,"skipped")} style={{flex:1,padding:14,borderRadius:16,background:t.card,border:`1px solid ${t.border}`,color:t.textSec,fontSize:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <I d={IC.skip} s={14} c={t.textSec}/>Pular
          </button>
          <button onClick={()=>{if(ds===0){if(!confirm("Nenhuma série feita. Concluir mesmo assim?"))return}complete(k,"done")}} style={{flex:2,padding:14,borderRadius:16,background:`linear-gradient(135deg,${t.accent},${t.accentDark})`,border:"none",color:"#fff",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <I d={IC.check} s={14} c="#fff"/>Concluir
          </button>
        </div>
      </div>
      </TC.Provider>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
